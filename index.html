<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Risk Engine</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<style>

/* 🍏 iOS SYSTEM UI */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;

  background: #f2f2f7;

  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 430px;

  padding: 16px;

  display: flex;
  flex-direction: column;

  gap: 12px;
}

/* GROUP */
.group {
  background: #fff;
  border-radius: 14px;
  border: 1px solid #e6e6e6;
}

/* SECTION */
.section {
  padding: 12px 14px;
  border-bottom: 1px solid #eee;
}

.section:last-child {
  border-bottom: none;
}

/* SCORE */
.score {
  font-size: 44px;
  font-weight: 600;
}

.label {
  font-size: 12px;
  color: #8e8e93;
}

/* COLORS */
.green { color: #34c759; }
.red { color: #ff3b30; }
.gray { color: #8e8e93; }

/* INPUT */
input, select {
  width: 100%;
  padding: 12px;

  font-size: 16px;

  border: none;
  outline: none;

  background: transparent;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;

  border-radius: 12px;
  border: none;

  background: #007aff;
  color: white;

  font-size: 16px;
  font-weight: 500;
}

button:active {
  opacity: 0.7;
}

</style>
</head>

<body>

<div class="app">

  <!-- SCORE -->
  <div class="group">

    <div class="section">
      <div class="label">SETUP SCORE</div>
      <div id="score" class="score gray">--</div>
      <div id="grade" style="font-size:13px;color:#8e8e93;">Waiting</div>
    </div>

    <div class="section">
      <div id="output" style="font-size:13px;color:#8e8e93;">
        No evaluation
      </div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="group">

    <div class="section">
      <input id="rsi" type="number" placeholder="RSI">
    </div>

    <div class="section">
      <input id="mfi" type="number" placeholder="MFI">
    </div>

    <div class="section">
      <select id="ma">
        <option value="up">MA Up</option>
        <option value="flat">MA Flat</option>
        <option value="down">MA Down</option>
      </select>
    </div>

    <div class="section">
      <select id="obv">
        <option value="up">OBV Up</option>
        <option value="flat">OBV Flat</option>
        <option value="down">OBV Down</option>
      </select>
    </div>

    <div class="section">
      <select id="regime">
        <option value="trend">Trending</option>
        <option value="range">Range</option>
        <option value="uncertain">Uncertain</option>
      </select>
    </div>

  </div>

  <button onclick="run()">Evaluate Setup</button>

</div>

<script>

function run() {

  let score = 50;

  let rsi = +document.getElementById("rsi").value || 50;
  let mfi = +document.getElementById("mfi").value || 50;
  let ma = document.getElementById("ma").value;
  let obv = document.getElementById("obv").value;
  let regime = document.getElementById("regime").value;

  if (ma === "up") score += 15;
  if (ma === "down") score -= 15;

  if (obv === "up") score += 15;
  if (obv === "down") score -= 15;

  if (rsi >= 40 && rsi <= 65) score += 10;
  if (rsi > 75) score -= 10;

  if (mfi > 60) score += 10;

  if (regime === "trend") score += 10;
  if (regime === "uncertain") score -= 20;

  score = Math.max(0, Math.min(100, score));

  let grade = "D";
  let pos = "0%";

  if (score >= 80) { grade = "A"; pos = "1.5%"; }
  else if (score >= 65) { grade = "B"; pos = "1.0%"; }
  else if (score >= 50) { grade = "C"; pos = "0.5%"; }

  let scoreEl = document.getElementById("score");
  scoreEl.innerText = score;

  scoreEl.className =
    "score " + (score >= 80 ? "green" : score < 50 ? "red" : "gray");

  document.getElementById("grade").innerText =
    "Grade: " + grade + " | Position: " + pos;

  document.getElementById("output").innerText =
    "Recommended Allocation: " + pos;
}

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
