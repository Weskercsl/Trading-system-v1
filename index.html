<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>V8 Trading Engine</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro",sans-serif;
  background:#f2f2f7;
  display:flex;
  justify-content:center;
}

.app{
  width:100%;
  max-width:430px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:14px;
  border:1px solid #e5e5ea;
}

.label{
  font-size:12px;
  color:#8e8e93;
  margin-bottom:6px;
}

.value{
  font-size:28px;
  font-weight:700;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

input,select{
  width:100%;
  border:none;
  outline:none;
  font-size:16px;
  padding:8px 0;
  background:transparent;
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  background:#007aff;
  color:white;
  font-size:16px;
  font-weight:600;
}

.green{color:#34c759;}
.orange{color:#ff9f0a;}
.red{color:#ff3b30;}

</style>
</head>

<body>

<div class="app">

<!-- RESULT -->
<div class="card">
  <div class="label">TRADE DECISION</div>
  <div id="decision" class="value">--</div>
</div>

<!-- OUTPUT -->
<div class="row">

<div class="card">
  <div class="label">POSITION SIZE</div>
  <div id="position" class="value">--</div>
</div>

<div class="card">
  <div class="label">SHARES</div>
  <div id="shares" class="value">--</div>
</div>

</div>

<div class="row">

<div class="card">
  <div class="label">MAX LOSS</div>
  <div id="loss" class="value">--</div>
</div>

<div class="card">
  <div class="label">EXPECTED PROFIT</div>
  <div id="profit" class="value">--</div>
</div>

</div>

<div class="card">
  <div class="label">R:R RATIO</div>
  <div id="rr" class="value">--</div>
</div>

<!-- INPUTS -->
<div class="card">
  <div class="label">TOTAL CAPITAL</div>
  <input type="number" id="capital" placeholder="10000">
</div>

<div class="card">
  <div class="label">RISK PER TRADE (%)</div>
  <input type="number" id="riskpct" placeholder="1">
</div>

<div class="card">
  <div class="label">ENTRY PRICE</div>
  <input type="number" id="entry">
</div>

<div class="card">
  <div class="label">STOP LOSS</div>
  <input type="number" id="stop">
</div>

<div class="card">
  <div class="label">TAKE PROFIT</div>
  <input type="number" id="tp">
</div>

<div class="card">
  <div class="label">RSI</div>
  <input type="number" id="rsi">
</div>

<div class="card">
  <div class="label">MFI</div>
  <input type="number" id="mfi">
</div>

<div class="card">
  <div class="label">TREND</div>
  <select id="ma">
    <option value="up">Uptrend</option>
    <option value="flat">Flat</option>
    <option value="down">Downtrend</option>
  </select>
</div>

<div class="card">
  <div class="label">VOLUME FLOW</div>
  <select id="obv">
    <option value="up">Bullish</option>
    <option value="flat">Neutral</option>
    <option value="down">Bearish</option>
  </select>
</div>

<div class="card">
  <div class="label">REGIME</div>
  <select id="regime">
    <option value="trend">Trend</option>
    <option value="range">Range</option>
    <option value="uncertain">Uncertain</option>
  </select>
</div>

<button onclick="calc()">CALCULATE</button>

</div>

<script>

function calc(){

  let capital = +document.getElementById("capital").value;
  let riskpct = +document.getElementById("riskpct").value;

  let entry = +document.getElementById("entry").value;
  let stop = +document.getElementById("stop").value;
  let tp = +document.getElementById("tp").value;

  let rsi = +document.getElementById("rsi").value || 50;
  let mfi = +document.getElementById("mfi").value || 50;

  let ma = document.getElementById("ma").value;
  let obv = document.getElementById("obv").value;
  let regime = document.getElementById("regime").value;

  // ===== V8 EDGE SCORE (Q) =====
  let Q = 50;

  if(regime === "trend"){
    if(ma === "up") Q += 20;
    if(ma === "down") Q -= 20;
    if(obv === "up") Q += 15;
    if(rsi > 45 && rsi < 70) Q += 10;
  }

  if(regime === "range"){
    if(rsi < 70 && rsi > 40) Q += 15;
    if(mfi > 55) Q += 10;
  }

  if(regime === "uncertain") Q -= 20;

  Q = Math.max(0, Math.min(100, Q));

  // ===== RISK STRUCTURE =====
  let R = Math.abs(entry - stop);
  let rr = (tp && entry && stop) ? (tp - entry) / (entry - stop) : 0;

  // ===== KELLY-LIKE ADJUSTMENT =====
  let riskMoney = capital * (riskpct / 100);

  // edge modifier
  let edgeFactor = Q / 100;

  let adjustedRisk = riskMoney * edgeFactor;

  let shares = R > 0 ? adjustedRisk / R : 0;

  let position = shares * entry;
  let loss = shares * R;
  let profit = shares * (tp - entry);

  // ===== DECISION =====
  let decision = "AVOID";

  if(Q > 75 && rr > 1.5) decision = "STRONG TRADE";
  else if(Q > 60 && rr > 1.2) decision = "TRADE";
  else if(Q > 45) decision = "WEAK TRADE";

  // ===== UI =====
  document.getElementById("decision").innerText = decision;
  document.getElementById("position").innerText = "$" + position.toFixed(0);
  document.getElementById("shares").innerText = shares.toFixed(2);
  document.getElementById("loss").innerText = "-$" + loss.toFixed(0);
  document.getElementById("profit").innerText = "+$" + profit.toFixed(0);
  document.getElementById("rr").innerText = rr.toFixed(2);

}

</script>

</body>
</html>
