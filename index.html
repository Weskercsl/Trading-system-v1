<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>V10 Quant Engine</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:#fff;
border-radius:16px;
padding:14px;
border:1px solid #e5e5ea;
}

.title{
font-size:26px;
font-weight:700;
}

.label{
font-size:12px;
color:#8e8e93;
}

.value{
font-size:24px;
font-weight:700;
}

.big{
font-size:32px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input, select{
width:100%;
font-size:16px;
border:none;
outline:none;
background:transparent;
padding:6px 0;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#007aff;
color:white;
font-size:16px;
font-weight:600;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
<div class="title">V10 QUANT ENGINE</div>
</div>

<div class="card">
<div class="label">DECISION</div>
<div id="decision" class="value big">--</div>
</div>

<div class="grid">

<div class="card">
<div class="label">EDGE</div>
<div id="edge" class="value">--</div>
</div>

<div class="card">
<div class="label">KELLY</div>
<div id="kelly" class="value">--</div>
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">POSITION</div>
<div id="pos" class="value">--</div>
</div>

<div class="card">
<div class="label">LOSS</div>
<div id="loss" class="value">--</div>
</div>

</div>

<div class="card">
<div class="label">PROFIT</div>
<div id="profit" class="value">--</div>
</div>

<div class="card">
<div class="label">CAPITAL</div>
<input id="capital" type="number" placeholder="10000">
</div>

<div class="card">
<div class="label">ENTRY</div>
<input id="entry" type="number" placeholder="100">
</div>

<div class="card">
<div class="label">STOP</div>
<input id="stop" type="number" placeholder="95">
</div>

<div class="card">
<div class="label">TARGET</div>
<input id="target" type="number" placeholder="110">
</div>

<div class="card">
<div class="label">RSI</div>
<input id="rsi" type="number" placeholder="50">
</div>

<div class="grid">

<div class="card">
<div class="label">TREND</div>
<select id="trend">
<option value="up">UP</option>
<option value="flat">RANGE</option>
<option value="down">DOWN</option>
</select>
</div>

<div class="card">
<div class="label">OBV</div>
<select id="obv">
<option value="up">UP</option>
<option value="flat">FLAT</option>
<option value="down">DOWN</option>
</select>
</div>

</div>

<button onclick="calc()">RUN MODEL</button>

</div>

<script>
function calc(){

const $ = id => document.getElementById(id);

/* FORCE UI CLEAR (important fix) */
$("decision").innerText = "--";
$("edge").innerText = "--";
$("kelly").innerText = "--";
$("pos").innerText = "--";
$("loss").innerText = "--";
$("profit").innerText = "--";

/* INPUTS (always fresh read) */
let capital = Number($("capital").value);
let entry = Number($("entry").value);
let stop = Number($("stop").value);
let target = Number($("target").value);
let rsi = Number($("rsi").value);

let trend = $("trend").value;
let obv = $("obv").value;

if(!capital || !entry || !stop || !target){
$("decision").innerText = "INPUT ERROR";
return;
}

/* =====================
DIRECTION ENGINE
===================== */
let D = 50;

if(trend === "up") D += 25;
if(trend === "down") D -= 25;

if(obv === "up") D += 15;
if(obv === "down") D -= 15;

/* =====================
RSI RISK
===================== */
let rsiRisk = Math.abs(rsi - 50) / 50;

/* =====================
EDGE
===================== */
let edge = D - (rsiRisk * 40);
edge = Math.max(0, Math.min(100, edge));

/* =====================
PROBABILITY
===================== */
let p = edge / 100;

/* =====================
R / R
===================== */
let R = Math.abs(entry - stop);
let rr = (target - entry) / (entry - stop);

/* =====================
KELLY
===================== */
let kelly = p - ((1 - p) / (Math.abs(rr) || 1));
kelly = Math.max(0, Math.min(0.02, kelly));

/* =====================
POSITION
===================== */
let risk = capital * kelly;
let shares = R ? risk / R : 0;

let pos = shares * entry;
let loss = shares * R;
let profit = shares * (target - entry);

/* =====================
DECISION
===================== */
let decision = "NO TRADE";
if(edge > 40) decision = "TRADE";
if(edge > 70) decision = "STRONG TRADE";

/* =====================
OUTPUT
===================== */
$("decision").innerText = decision;
$("edge").innerText = edge.toFixed(0);
$("kelly").innerText = (kelly*100).toFixed(2) + "%";
$("pos").innerText = "$" + pos.toFixed(0);
$("loss").innerText = "-$" + loss.toFixed(0);
$("profit").innerText = "+$" + profit.toFixed(0);

}
}
</script>

</body>
</html>
