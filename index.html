<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>V8 Core Engine</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
background:#f2f2f7;
display:flex;
justify-content:center;
}

.app{
width:100%;
max-width:420px;
padding:16px;
display:flex;
flex-direction:column;
gap:12px;
}

.card{
background:white;
border-radius:16px;
padding:14px;
border:1px solid #e5e5ea;
}

.title{
font-size:28px;
font-weight:700;
margin-bottom:10px;
}

.label{
font-size:12px;
color:#8e8e93;
}

.value{
font-size:26px;
font-weight:700;
margin-top:4px;
}

.big{
font-size:34px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

input{
width:100%;
font-size:16px;
padding:8px 0;
border:none;
outline:none;
background:transparent;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#007aff;
color:white;
font-size:16px;
font-weight:600;
}
</style>
</head>

<body>

<div class="app">

<div class="card">
<div class="title">V8 CORE ENGINE</div>
</div>

<div class="card">
<div class="label">DECISION</div>
<div id="decision" class="value big">--</div>
</div>

<div class="grid">

<div class="card">
<div class="label">Q SCORE</div>
<div id="q" class="value">--</div>
</div>

<div class="card">
<div class="label">RISK %</div>
<div id="risk" class="value">--</div>
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">POSITION</div>
<div id="pos" class="value">--</div>
</div>

<div class="card">
<div class="label">SHARES</div>
<div id="shares" class="value">--</div>
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">LOSS</div>
<div id="loss" class="value">--</div>
</div>

<div class="card">
<div class="label">PROFIT</div>
<div id="profit" class="value">--</div>
</div>

</div>

<div class="card">
<div class="label">R MULTIPLE</div>
<div id="rr" class="value">--</div>
</div>

<div class="card">
<div class="label">CAPITAL</div>
<input id="capital" type="number">
</div>

<div class="card">
<div class="label">ENTRY</div>
<input id="entry" type="number">
</div>

<div class="card">
<div class="label">STOP</div>
<input id="stop" type="number">
</div>

<div class="card">
<div class="label">TARGET</div>
<input id="target" type="number">
</div>

<div class="grid">

<div class="card">
<div class="label">RSI</div>
<input id="rsi" type="number">
</div>

<div class="card">
<div class="label">MFI</div>
<input id="mfi" type="number">
</div>

</div>

<div class="grid">

<div class="card">
<div class="label">MOMENTUM</div>
<select id="mom">
<option value="up">UP</option>
<option value="flat">FLAT</option>
<option value="down">DOWN</option>
</select>
</div>

<div class="card">
<div class="label">OBV</div>
<select id="obv">
<option value="up">UP</option>
<option value="flat">FLAT</option>
<option value="down">DOWN</option>
</select>
</div>

</div>

<div class="card">
<div class="label">TREND</div>
<select id="trend">
<option value="up">UPTREND</option>
<option value="flat">RANGE</option>
<option value="down">DOWNTREND</option>
</select>
</div>

<button onclick="calc()">ANALYZE</button>

</div>

<script>
function calc(){

const $ = id => document.getElementById(id);

let capital = +$("capital").value;
let entry = +$("entry").value;
let stop = +$("stop").value;
let target = +$("target").value;

let rsi = +$("rsi").value || 50;
let mfi = +$("mfi").value || 50;

let mom = $("mom").value;
let obv = $("obv").value;
let trend = $("trend").value;

if(!capital || !entry || !stop || !target){
$("decision").innerText = "INPUT ERROR";
return;
}

/* =======================
Q SCORE ENGINE
======================= */

let Q = 50;

if(trend==="up") Q += 25;
if(trend==="down") Q -= 25;

if(obv==="up") Q += 15;
if(obv==="down") Q -= 15;

if(mom==="up") Q += 10;
if(mom==="down") Q -= 10;

if(rsi>45 && rsi<70) Q += 10;
if(rsi>80) Q -= 10;

if(mfi>50) Q += 10;
if(mfi>80) Q -= 10;

Q = Math.max(0,Math.min(100,Q));

/* =======================
AUTO RISK (KELLY STYLE)
======================= */

let risk;

if(Q>=85) risk=0.02;
else if(Q>=70) risk=0.015;
else if(Q>=55) risk=0.01;
else if(Q>=40) risk=0.005;
else risk=0.0025;

/* cap safety */
if(trend==="flat") risk*=0.7;

/* =======================
POSITION SIZING
======================= */

let R = Math.abs(entry-stop);
let riskAmt = capital*risk;

let shares = R? riskAmt/R:0;
let pos = shares*entry;

let loss = shares*R;
let profit = shares*(target-entry);

let rr = (entry-stop!==0)? (target-entry)/(entry-stop):0;

/* =======================
DECISION
======================= */

let decision="NO TRADE";
if(Q>=70) decision="TRADE";
if(Q>=85) decision="STRONG TRADE";

/* =======================
OUTPUT
======================= */

$("decision").innerText=decision;
$("q").innerText=Q.toFixed(0);
$("risk").innerText=(risk*100).toFixed(2)+"%";
$("pos").innerText="$"+pos.toFixed(0);
$("shares").innerText=shares.toFixed(2);
$("loss").innerText="-$"+loss.toFixed(0);
$("profit").innerText="+$"+profit.toFixed(0);
$("rr").innerText=rr.toFixed(2);

}
</script>

</body>
</html>
