<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>

<title>V8 Risk Engine</title>

<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
  background:#f2f2f7;
  display:flex;
  justify-content:center;
  color:#111;
}

.app{
  width:100%;
  max-width:430px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:14px;
}

.group{
  background:#fff;
  border-radius:18px;
  border:1px solid #e9e9ee;
  overflow:hidden;
}

.section{
  padding:15px;
  border-bottom:1px solid #f1f1f4;
}

.section:last-child{
  border-bottom:none;
}

.label{
  font-size:12px;
  color:#8e8e93;
  margin-bottom:6px;
}

.big{
  font-size:36px;
  font-weight:650;
  line-height:1.1;
}

.medium{
  font-size:26px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#8e8e93;
  margin-top:5px;
}

.green{color:#34c759;}
.orange{color:#ff9f0a;}
.red{color:#ff3b30;}
.gray{color:#8e8e93;}

input,select{
  width:100%;
  border:none;
  outline:none;
  background:transparent;
  font-size:16px;
  padding:4px 0;
}

button{
  width:100%;
  border:none;
  border-radius:16px;
  padding:16px;
  background:#007aff;
  color:white;
  font-size:17px;
  font-weight:600;
}

button:active{
  opacity:0.75;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.smallCard{
  background:#fff;
  border-radius:18px;
  border:1px solid #e9e9ee;
  padding:15px;
}

</style>

</head>

<body>

<div class="app">

  <!-- RESULT -->
  <div class="group">

    <div class="section">
      <div class="label">TRADE QUALITY</div>
      <div id="quality" class="big gray">--</div>
      <div class="sub">Measures setup attractiveness</div>
    </div>

    <div class="section">
      <div class="label">SCORE</div>
      <div id="score" class="medium">--</div>
    </div>

  </div>

  <!-- OUTPUT -->
  <div class="grid">

    <div class="smallCard">
      <div class="label">POSITION</div>
      <div id="position" class="medium">--</div>
      <div class="sub">Suggested exposure</div>
    </div>

    <div class="smallCard">
      <div class="label">ESTIMATED LOSS</div>
      <div id="risk" class="medium">--</div>
      <div class="sub">If stop is hit</div>
    </div>

  </div>

  <!-- INPUT -->
  <div class="group">

    <div class="section">
      <input id="capital" type="number" placeholder="Total Capital ($)">
    </div>

    <div class="section">
      <input id="planned" type="number" placeholder="Planned Allocation (%)">
    </div>

    <div class="section">
      <input id="entry" type="number" placeholder="Entry Price">
    </div>

    <div class="section">
      <input id="stop" type="number" placeholder="Stop Price">
    </div>

    <div class="section">
      <input id="rsi" type="number" placeholder="RSI">
    </div>

    <div class="section">
      <input id="mfi" type="number" placeholder="MFI">
    </div>

    <div class="section">
      <select id="ma">
        <option value="up">MA Uptrend</option>
        <option value="flat">MA Flat</option>
        <option value="down">MA Downtrend</option>
      </select>
    </div>

    <div class="section">
      <select id="obv">
        <option value="up">OBV Rising</option>
        <option value="flat">OBV Flat</option>
        <option value="down">OBV Falling</option>
      </select>
    </div>

    <div class="section">
      <select id="regime">
        <option value="trend">Trending</option>
        <option value="range">Range</option>
        <option value="uncertain">Uncertain</option>
      </select>
    </div>

  </div>

  <button onclick="run()">Evaluate Trade</button>

</div>

<script>

function run(){

  let capital = +document.getElementById("capital").value || 0;
  let planned = +document.getElementById("planned").value || 0;
  let entry   = +document.getElementById("entry").value || 0;
  let stop    = +document.getElementById("stop").value || 0;

  let rsi = +document.getElementById("rsi").value || 50;
  let mfi = +document.getElementById("mfi").value || 50;

  let ma = document.getElementById("ma").value;
  let obv = document.getElementById("obv").value;
  let regime = document.getElementById("regime").value;

  // V8 SCORE ENGINE
  let score = 50;

  if(regime === "trend"){
    if(ma === "up") score += 22;
    if(ma === "down") score -= 22;

    if(obv === "up") score += 18;
    if(obv === "down") score -= 18;

    if(rsi >= 45 && rsi <= 70) score += 8;
    if(mfi > 60) score += 7;
  }

  if(regime === "range"){
    if(rsi >= 40 && rsi <= 65) score += 18;
    if(rsi > 75) score -= 15;
    if(mfi > 60) score += 12;
    if(ma === "down") score -= 10;
  }

  if(regime === "uncertain"){
    score -= 22;
  }

  if(obv === "up") score += 5;

  score = Math.max(0, Math.min(100, score));

  // TRADE DECISION
  let quality = "Avoid";
  let modifier = 0;

  if(score >= 82){
    quality = "Good Trade";
    modifier = 1.0;
  } else if(score >= 68){
    quality = "Tradable";
    modifier = 0.7;
  } else if(score >= 52){
    quality = "Small Position";
    modifier = 0.4;
  }

  let adjustedPercent = planned * modifier;
  adjustedPercent = Math.min(adjustedPercent, 15);

  let positionDollar = capital * (adjustedPercent / 100);

  // FIXED: safe risk calculation (no NaN / divide issues)
  let riskPerShare = 0;
  if(entry > 0 && stop > 0){
    riskPerShare = Math.abs(entry - stop);
  }

  let shares = 0;
  if(entry > 0){
    shares = positionDollar / entry;
  }

  let estimatedLoss = shares * riskPerShare;

  // UI
  let q = document.getElementById("quality");
  q.innerText = quality;

  q.className =
    "big " +
    (score >= 82 ? "green" : score >= 52 ? "orange" : "red");

  document.getElementById("score").innerText = score.toFixed(0);
  document.getElementById("position").innerText = "$" + positionDollar.toFixed(0);
  document.getElementById("risk").innerText = "$" + estimatedLoss.toFixed(0);

}

</script>

</body>
</html>
