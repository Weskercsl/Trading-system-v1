<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>V8 Engine FULL</title>

<link rel="stylesheet" href="style.css?v=20">
<link rel="manifest" href="manifest.json">

</head>

<body>

<div class="app">

<!-- OUTPUT -->
<div class="card">
  <div class="label">DECISION</div>
  <div id="decision" class="value">--</div>
</div>

<div class="row">
  <div class="card">
    <div class="label">Q SCORE</div>
    <div id="qscore" class="value">--</div>
  </div>

  <div class="card">
    <div class="label">REGIME</div>
    <div id="regout" class="value">--</div>
  </div>
</div>

<div class="row">
  <div class="card">
    <div class="label">POSITION</div>
    <div id="position" class="value">--</div>
  </div>

  <div class="card">
    <div class="label">SHARES</div>
    <div id="shares" class="value">--</div>
  </div>
</div>

<div class="row">
  <div class="card">
    <div class="label">LOSS</div>
    <div id="loss" class="value">--</div>
  </div>

  <div class="card">
    <div class="label">PROFIT</div>
    <div id="profit" class="value">--</div>
  </div>
</div>

<div class="card">
  <div class="label">R:R</div>
  <div id="rr" class="value">--</div>
</div>

<!-- INPUTS -->
<div class="card"><div class="label">CAPITAL</div><input type="number" id="capital"></div>
<div class="card"><div class="label">RISK %</div><input type="number" id="riskpct"></div>
<div class="card"><div class="label">ENTRY</div><input type="number" id="entry"></div>
<div class="card"><div class="label">STOP</div><input type="number" id="stop"></div>
<div class="card"><div class="label">TP</div><input type="number" id="tp"></div>

<div class="card"><div class="label">RSI</div><input type="number" id="rsi"></div>
<div class="card"><div class="label">MFI</div><input type="number" id="mfi"></div>

<div class="card">
  <div class="label">MA TREND</div>
  <select id="ma">
    <option value="up">Up</option>
    <option value="flat">Flat</option>
    <option value="down">Down</option>
  </select>
</div>

<div class="card">
  <div class="label">OBV</div>
  <select id="obv">
    <option value="up">Bullish</option>
    <option value="flat">Neutral</option>
    <option value="down">Bearish</option>
  </select>
</div>

<div class="card">
  <div class="label">REGIME</div>
  <select id="regime">
    <option value="trend">Trend</option>
    <option value="range">Range</option>
    <option value="uncertain">Uncertain</option>
  </select>
</div>

<button onclick="calc()">CALCULATE</button>

</div>

<script>
function calc(){

  // SAFE DOM (关键修复)
  const el = id => document.getElementById(id);

  let decisionEl = el("decision");
  let qscoreEl = el("qscore");
  let regoutEl = el("regout");
  let positionEl = el("position");
  let sharesEl = el("shares");
  let lossEl = el("loss");
  let profitEl = el("profit");
  let rrEl = el("rr");

  // INPUTS SAFE
  let capital = Number(el("capital").value || 0);
  let riskpct = Number(el("riskpct").value || 0);
  let entry = Number(el("entry").value || 0);
  let stop = Number(el("stop").value || 0);
  let tp = Number(el("tp").value || 0);

  let rsi = Number(el("rsi").value || 50);
  let mfi = Number(el("mfi").value || 50);

  let ma = el("ma").value;
  let obv = el("obv").value;
  let regime = el("regime").value;

  if(!capital || !entry || !stop){
    decisionEl.innerText = "INPUT ERROR";
    return;
  }

  // ===== REGIME =====
  let regimeFactor = 1;

  if(regime === "trend") regoutEl.innerText = "TREND";
  if(regime === "range") {regoutEl.innerText = "RANGE"; regimeFactor = 0.8;}
  if(regime === "uncertain") {regoutEl.innerText = "UNCERTAIN"; regimeFactor = 0.5;}

  // ===== Q SCORE =====
  let Q = 50;

  if(ma === "up") Q += 15;
  if(obv === "up") Q += 15;

  if(rsi > 45 && rsi < 70) Q += 10;
  if(mfi > 50) Q += 10;

  if(regime === "uncertain") Q -= 20;

  Q = Math.max(0, Math.min(100, Q));
  Q = Q * regimeFactor;

  qscoreEl.innerText = Q.toFixed(0);

  // ===== RISK ENGINE =====
  let R = Math.abs(entry - stop);
  let riskMoney = capital * (riskpct / 100);

  let adjustedRisk = riskMoney * (Q / 100);

  let shares = R ? adjustedRisk / R : 0;

  let position = shares * entry;
  let loss = shares * R;
  let profit = shares * (tp - entry);

  let rr = (entry - stop !== 0) ? (tp - entry) / (entry - stop) : 0;

  // ===== DECISION =====
  let decision = "AVOID";
  if(Q > 75) decision = "STRONG TRADE";
  else if(Q > 60) decision = "TRADE";

  // OUTPUT
  decisionEl.innerText = decision;
  positionEl.innerText = "$" + position.toFixed(0);
  sharesEl.innerText = shares.toFixed(2);
  lossEl.innerText = "-$" + loss.toFixed(0);
  profitEl.innerText = "+$" + profit.toFixed(0);
  rrEl.innerText = rr.toFixed(2);
}
</script>

</body>
</html>
